<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{"name":"%E5%A4%AA%E5%B9%B3%E6%B4%8B%E4%BA%A7%E9%99%A9","short_name":"%E5%A4%96%E5%8B%A4%E5%8A%A9%E6%89%8B","start_url":".","display":"standalone","background_color":"#2563eb","theme_color":"#2563eb","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%232563eb%27/%3E%3Ctext x=%2716%27 y=%2723%27 text-anchor=%27middle%27 fill=%27white%27 font-size=%2720%27 font-weight=%27bold%27%3EP%3C/text%3E%3C/svg%3E","sizes":"32x32","type":"image/svg+xml"}]}">

<title>太平洋产险 · 外勤助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif}
:root{--blue:#2563eb;--blue-light:#dbeafe;--teal:#0d9488;--teal-light:#ccfbf1;--amber:#d97706;--amber-light:#fef3c7;--emerald:#059669;--emerald-light:#d1fae5;--rose:#e11d48;--rose-light:#ffe4e6;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--radius:10px;--safe-bottom:env(safe-area-inset-bottom,8px)}
input,select,textarea,button{font-family:inherit}
.login-screen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;transition:opacity .4s,transform .4s;overflow-y:auto}
.login-screen.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
.login-logo{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;margin-bottom:12px}
.login-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:28px}
.login-box{background:#fff;border-radius:16px;padding:24px 20px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.login-box .fg{margin-bottom:14px}.login-box label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:4px}
.login-box input{width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid var(--gray-200);font-size:16px;transition:border-color .2s;background:var(--gray-50)}
.login-box input:focus{outline:none;border-color:var(--blue);background:#fff}
.login-box .lbtn{width:100%;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:6px}.login-box .pri{background:var(--blue);color:#fff}
.login-box .pri:active{opacity:.85}.login-box .sec{background:transparent;color:var(--blue);border:1.5px solid var(--blue);margin-top:8px}
.login-box .err{color:var(--rose);font-size:12px;margin-top:8px;display:none}
.login-box .hint{font-size:11px;color:var(--gray-400);text-align:center;margin-top:10px;line-height:1.5}
.app{display:none;padding-bottom:80px}.app.show{display:block}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:14px 16px 12px;padding-top:max(14px,env(safe-area-inset-top));display:flex;justify-content:space-between;align-items:flex-start}
.hl .nm{font-size:16px;font-weight:700}.hl .sb{font-size:11px;opacity:.8;margin-top:2px}.hr{display:flex;gap:6px}
.hbtn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:99;background:#fff;border-top:1px solid var(--gray-200);display:flex;padding:4px 0;padding-bottom:var(--safe-bottom);box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nav{flex:1;display:flex;flex-direction:column;align-items:center;padding:5px 0;border:none;background:none;cursor:pointer;font-size:9px;color:var(--gray-400);transition:color .15s;font-family:inherit}
.nav .ic{font-size:18px;margin-bottom:1px}.nav.act{color:var(--blue);font-weight:600}
.pn{display:none;padding:12px;animation:fi .2s}.pn.act{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cd{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--gray-100)}
.ct{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.ct .bd{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:2px 10px;border-radius:20px}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.qa{padding:16px 10px;border-radius:12px;border:none;text-align:center;cursor:pointer;transition:transform .15s;font-family:inherit}
.qa:active{transform:scale(.96)}.qa .ej{font-size:26px;margin-bottom:3px}.qa .lb{font-size:13px;font-weight:600;color:var(--gray-700)}.qa .sl{font-size:10px;color:var(--gray-500);margin-top:1px}
.qv{background:var(--blue-light)}.ql{background:var(--emerald-light)}.qc{background:var(--teal-light)}.qs{background:var(--amber-light)}
.kr{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.ki{flex-shrink:0;background:var(--gray-50);border-radius:8px;padding:8px 14px;text-align:center;min-width:68px}
.ki .kv{font-size:18px;font-weight:800;color:var(--gray-800)}.ki .kl{font-size:9px;color:var(--gray-500);margin-top:1px}
.fg{margin-bottom:10px}.fg label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--gray-200);font-size:15px;background:#fff;transition:border-color .2s;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.fg textarea{min-height:60px;resize:vertical;font-size:14px}.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bb{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:opacity .15s;font-family:inherit}.bb:active{opacity:.85}
.bbp{background:var(--blue);color:#fff}.bbs{background:var(--emerald);color:#fff}.bbo{background:transparent;color:var(--blue);border:1.5px solid var(--blue);margin-top:8px}
.li{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--gray-100);cursor:pointer}.li:last-child{border:none}
.li .mn{flex:1;min-width:0}.li .mn .nm{font-size:14px;font-weight:600;color:var(--gray-800)}.li .mn .mt{font-size:11px;color:var(--gray-500);margin-top:2px;line-height:1.4}
.li .rt{text-align:right;flex-shrink:0;margin-left:8px}
.tg{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.td{background:var(--emerald-light);color:var(--emerald)}.tp{background:var(--amber-light);color:var(--amber)}.ti{background:var(--blue-light);color:var(--blue)}.tl{background:var(--rose-light);color:var(--rose)}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.ac{background:var(--gray-50);border-radius:8px;padding:14px;text-align:center}
.ac .av{font-size:22px;font-weight:800}.ac .al{font-size:11px;color:var(--gray-500);margin-top:2px}
.ab{height:6px;background:var(--gray-200);border-radius:3px;margin:6px 0;overflow:hidden}.ab .fl{height:100%;border-radius:3px;transition:width .6s}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}.mo.open{display:flex}
.ms{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 16px;padding-bottom:max(20px,var(--safe-bottom));animation:su .3s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}.mh{width:36px;height:4px;background:var(--gray-300);border-radius:2px;margin:0 auto 14px}.mt{font-size:16px;font-weight:700;margin-bottom:16px}
.em{text-align:center;padding:32px 16px;color:var(--gray-400);font-size:13px;line-height:1.6}
.ts{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:300;display:none;backdrop-filter:blur(8px);white-space:nowrap;max-width:85vw;text-align:center}
.ts.sh{display:block;animation:ti .3s}@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.sr{display:flex;gap:8px;margin-bottom:10px}.sr input{flex:1;padding:9px 12px;border-radius:8px;border:1.5px solid var(--gray-200);font-size:14px;background:#fff}
.sr input:focus{outline:none;border-color:var(--blue)}.sr select{padding:8px 10px;border-radius:8px;border:1.5px solid var(--gray-200);font-size:11px;background:#fff}
.sb{background:var(--gray-50);border-radius:var(--radius);padding:16px;text-align:center;margin-top:12px}.sb .ht{font-size:12px;color:var(--gray-500);margin-bottom:10px;line-height:1.6}
.sb .sbt{display:flex;gap:8px;justify-content:center}.sb .sbt .bb{flex:1;max-width:170px;padding:12px;font-size:13px}
.bank-hide{display:none}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-logo">P</div>
  <div class="login-title">太平洋产险</div>
  <div class="login-sub">外勤助手 · 数据受密码保护</div>
  <div class="login-box">
    <div id="loginForm">
      <div class="fg"><label>你的名字</label><input type="text" id="loginName" placeholder="请输入姓名" autocomplete="off"></div>
      <div class="fg"><label id="loginPwdLabel">设置密码</label><input type="password" id="loginPwd" placeholder="不少于4位" autocomplete="new-password"></div>
      <div class="err" id="loginError"></div>
      <button class="lbtn pri" id="loginBtn" onclick="handleLogin()">进入</button>
      <button class="lbtn sec" id="switchLoginMode" onclick="toggleLoginMode()">已有账号？去登录</button>
      <div class="hint" id="loginHint">首次使用请填写姓名并设置密码</div>
    </div>
  </div>
</div>
<div class="app" id="appBody">
<div class="header">
  <div class="hl"><div class="nm" id="headerName">--</div><div class="sb">外勤助手</div></div>
  <div class="hr">
    <button class="hbtn" onclick="openModal('syncModal')">📊</button>
    <button class="hbtn" onclick="doLock()">🔒 锁定</button>
  </div>
</div>

<div class="pn act" id="panel-home">
  <div class="qg">
    <button class="qa qv" onclick="openForm('visit')"><div class="ej">📋</div><div class="lb">记拜访</div><div class="sl">选择客群大类</div></button>
    <button class="qa ql" onclick="openForm('lead')"><div class="ej">🎯</div><div class="lb">添意向</div><div class="sl">意向客户登记</div></button>
    <button class="qa qc" onclick="openForm('customer')"><div class="ej">👥</div><div class="lb">加客户</div><div class="sl">新建客户档案</div></button>
    <button class="qa qs" onclick="openModal('syncModal')"><div class="ej">📊</div><div class="lb">我的分析</div><div class="sl">个人业绩分析</div></button>
  </div>
  <div class="kr" id="homeKpi"></div>
  <div class="cd"><div class="ct">今日待办 <span class="bd" id="todoCount">0</span></div><div id="todoList"></div></div>
  <div class="cd"><div class="ct">即将拜访 <span class="bd" id="upcomingCount">0</span></div><div id="upcomingList"></div></div>
  <div class="cd"><div class="ct">📈 个人业绩趋势</div><div id="personalTrend" style="font-size:13px;color:var(--gray-600);line-height:1.8"></div></div>
</div>

<div class="pn" id="panel-visits">
  <div class="sr"><input type="text" id="mvSearch" placeholder="搜索..." oninput="renderVisits()"><select id="mvFilter" onchange="renderVisits()"><option value="all">全部</option><option value="today">今天</option><option value="week">本周</option></select></div>
  <div class="kr" id="visitKpi"></div>
  <div id="visitList"></div>
</div>

<div class="pn" id="panel-leads">
  <div class="sr"><input type="text" id="mlSearch" placeholder="搜索..." oninput="renderLeads()"><select id="mlFilter" onchange="renderLeads()"><option value="all">全部阶段</option><option>初步接触</option><option>需求分析</option><option>方案报价</option><option>跟进中</option><option>即将成交</option><option>已成交</option><option>已流失</option></select></div>
  <div class="kr" id="leadKpi"></div>
  <div id="leadList"></div>
</div>
<div class="pn" id="panel-me">
  <div class="cd"><div class="ct">👤 个人资料</div><div style="font-size:14px"><strong id="meName"></strong></div><div style="font-size:12px;color:var(--gray-500);margin-top:4px" id="meInfo"></div></div>
  <div class="cd"><div class="ct">📊 我的数据分析</div><div id="myAnalysis"></div></div>
  <div class="cd">
    <div class="ct">💾 数据同步</div>
    <div class="sb">
      <div class="ht"><strong>加密导出</strong> - 发给管理者，需密码<br><strong>明文导出</strong> - 直接导入</div>
      <div class="sbt"><button class="bb bbp" onclick="doExport(true)">加密导出</button><button class="bb bbo" onclick="doExport(false)" style="margin-top:0">明文导出</button></div>
      <div style="margin:12px 0;text-align:center;color:var(--gray-300);font-size:11px">- 或 -</div>
      <div class="sbt"><button class="bb bbo" onclick="document.getElementById('importFile').click()" style="margin-top:0">导入数据</button><button class="bb bbo" onclick="changePassword()" style="margin-top:0">修改密码</button></div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(event)">
    </div>
  </div>
</div>

<nav class="bnav">
  <button class="nav act" data-panel="home" onclick="switchPanel('home')"><span class="ic">🏠</span><span>首页</span></button>
  <button class="nav" data-panel="visits" onclick="switchPanel('visits')"><span class="ic">📋</span><span>拜访</span></button>
  <button class="nav" data-panel="leads" onclick="switchPanel('leads')"><span class="ic">🎯</span><span>意向</span></button>
  <button class="nav" data-panel="me" onclick="switchPanel('me')"><span class="ic">👤</span><span>我的</span></button>
</nav>
</div>

<div class="ts" id="toast"></div>
<div class="mo" id="visitModal"><div class="ms">
  <div class="mh"></div><div class="mt">记拜访</div>
  <div class="fg"><label>客户名称</label><input id="fvCustomer" placeholder="如：营业部名称"></div>
  <div class="fg"><label>客群大类</label><select id="fvCategory" onchange="toggleBankSub()"><option value="银行">银行</option><option value="邮政">邮政</option><option value="交叉/个代">交叉/个代</option><option value="信保">信保</option></select></div>
  <div class="fg bank-hide" id="bankSelectGroup"><label>具体银行</label><select id="fvBank"><option>中行</option><option>农行</option><option>工行</option><option>建行</option><option>交行</option><option>邮储</option><option>长沙银行</option><option>浙商行</option><option>中信</option><option>浦发</option><option>其他</option></select></div>
  <div class="fg bank-hide" id="bankSubGroup"><label>二级行（网点）</label><input id="fvBankSub" placeholder="如：天心支行"></div>
  <div class="fr"><div class="fg"><label>日期</label><input id="fvDate" type="date"></div><div class="fg"><label>意向度</label><select id="fvInterest"><option>高</option><option selected>中</option><option>低</option></select></div></div>
  <div class="fg"><label>拜访内容</label><textarea id="fvContent" placeholder="记录重点沟通内容..."></textarea></div>
  <div class="fg"><label>需要的支持</label><textarea id="fvSupport" placeholder="客户提出的需求或需要公司提供的支持..." style="min-height:50px"></textarea></div>
  <div class="fr"><div class="fg"><label>预计下次拜访</label><input id="fvNextDate" type="date"></div></div>
  <button class="bb bbp" onclick="saveVisit()">保存</button>
  <button class="bb bbo" onclick="closeModal('visitModal')">取消</button>
</div></div>

<div class="mo" id="leadModal"><div class="ms">
  <div class="mh"></div><div class="mt">意向客户</div>
  <div class="fg"><label>客户名称</label><input id="flName" placeholder="公司/个人名称"></div>
  <div class="fr"><div class="fg"><label>联系人</label><input id="flContact" placeholder="联系人"></div><div class="fg"><label>电话</label><input id="flPhone" type="tel" placeholder="手机号"></div></div>
  <div class="fg"><label>来单渠道</label><select id="flChannel" onchange="toggleReferrer()"><option value="银行">银行</option><option value="邮政">邮政</option><option value="交叉/个代">交叉/个代</option><option value="信保">信保</option><option value="转介绍">转介绍</option></select></div>
  <div class="fg bank-hide" id="referrerGroup"><label>介绍人姓名</label><input id="flReferrer" placeholder="介绍人姓名"></div>
  <div class="fg"><label>客户行业</label><select id="flIndustry"><option value="">请选择</option><option>制造业</option><option>金融业</option><option>零售业</option><option>医疗健康</option><option>教育</option><option>建筑地产</option><option>政府/事业单位</option><option>个体工商户</option><option>个人</option><option>其他</option></select></div>
  <div class="fg"><label>意向险种</label><input id="flProduct" placeholder="如：意外险、健康险"></div>
  <div class="fr"><div class="fg"><label>预计保费(万)</label><input id="flAmount" type="number" step="0.1"></div><div class="fg"><label>预计成交</label><input id="flCloseDate" type="date"></div></div>
  <div class="fg"><label>阶段</label><select id="flStage"><option>初步接触</option><option>需求分析</option><option>方案报价</option><option>跟进中</option><option>即将成交</option><option>已成交</option><option>已流失</option></select></div>
  <button class="bb bbs" onclick="saveLead()">保存</button>
  <button class="bb bbo" onclick="closeModal('leadModal')">取消</button>
</div></div>

<div class="mo" id="customerModal"><div class="ms">
  <div class="mh"></div><div class="mt">新建客户</div>
  <div class="fg"><label>客户名称</label><input id="fcName" placeholder="公司全称"></div>
  <div class="fr"><div class="fg"><label>联系人</label><input id="fcContact" placeholder="联系人"></div><div class="fg"><label>电话</label><input id="fcPhone" type="tel" placeholder="手机号"></div></div>
  <div class="fr"><div class="fg"><label>客户等级</label><select id="fcLevel"><option>A级(重点)</option><option>B级(潜力)</option><option>C级(普通)</option><option>D级(观察)</option></select></div><div class="fg"><label>所属行业</label><select id="fcIndustry"><option>制造业</option><option>金融业</option><option>零售业</option><option>医疗健康</option><option>教育</option><option>建筑地产</option><option>政府/事业单位</option><option>个体工商户</option><option>个人</option><option>其他</option></select></div></div>
  <div class="fr"><div class="fg"><label>客户规模</label><select id="fcSize"><option>大型企业</option><option>中型企业</option><option>小型企业</option><option>个人</option></select></div><div class="fg"><label>年保费(万)</label><input id="fcPremium" type="number" step="0.1" placeholder="0"></div></div>
  <div class="fg"><label>关键决策人</label><input id="fcDecision" placeholder="关键联系人/职位"></div>
  <div class="fg"><label>地址</label><input id="fcAddress" placeholder="选填"></div>
  <button class="bb bbp" onclick="saveCustomer()">保存</button>
  <button class="bb bbo" onclick="closeModal('customerModal')">取消</button>
</div></div>

<div class="mo" id="syncModal"><div class="ms">
  <div class="mh"></div><div class="mt">我的业绩分析</div>
  <div id="analysisContent"></div>
  <button class="bb bbo" onclick="closeModal('syncModal')">关闭</button>
</div></div>
<script>
// localStorage fallback for file:// protocol on mobile
(function() {
  var _ls;
  try {
    _ls = window.localStorage;
    var testKey = '_ls_test_';
    _ls.setItem(testKey, '1');
    _ls.removeItem(testKey);
  } catch(e) {
    // localStorage not available (file:// on iOS etc.) - use in-memory store
    var _store = {};
    _ls = {
      getItem: function(k) { return _store[k] || null; },
      setItem: function(k, v) { _store[k] = String(v); },
      removeItem: function(k) { delete _store[k]; },
      clear: function() { _store = {}; },
      get length() { return Object.keys(_store).length; },
      key: function(i) { return Object.keys(_store)[i] || null; }
    };
    console.warn('localStorage unavailable, using in-memory fallback. Data will not persist across page reloads.');
  }
  // Override localStorage in the app's scope
  window._localStorage = _ls;
})();

async function deriveKey(pwd, salt) {
  var enc = new TextEncoder();
  var mat = await crypto.subtle.importKey("raw", enc.encode(pwd), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"}, mat, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);
}
async function encryptData(data, pwd) {
  var salt = crypto.getRandomValues(new Uint8Array(16));
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var key = await deriveKey(pwd, salt);
  var enc = new TextEncoder().encode(JSON.stringify(data));
  var e = await crypto.subtle.encrypt({name:"AES-GCM",iv:iv}, key, enc);
  return {v:1,type:"cpic_encrypted",salt:Array.from(salt),iv:Array.from(iv),data:Array.from(new Uint8Array(e))};
}
async function decryptData(obj, pwd) {
  var salt = new Uint8Array(obj.salt), iv = new Uint8Array(obj.iv), data = new Uint8Array(obj.data);
  var key = await deriveKey(pwd, salt);
  var d = await crypto.subtle.decrypt({name:"AES-GCM",iv:iv}, key, data);
  return JSON.parse(new TextDecoder().decode(d));
}

function shash(s){var h=0,i,c;for(i=0;i<s.length;i++){c=s.charCodeAt(i);h=((h<<5)-h)+c;h=h&h}return"h"+Math.abs(h).toString(36)}

function handleLogin(){
  var name=document.getElementById("loginName").value.trim();
  var pwd=document.getElementById("loginPwd").value;
  var err=document.getElementById("loginError");err.style.display="none";
  if(!name){err.textContent="请输入姓名";err.style.display="block";return}
  if(!pwd||pwd.length<4){err.textContent="密码不少于4位";err.style.display="block";return}
  var sh=localStorage.getItem("p_"+name);
  if(isLogin){
    if(!sh){err.textContent="用户"+name+"不存在";err.style.display="block";return}
    if(shash(pwd)!==sh){err.textContent="密码错误";err.style.display="block";return}
  }else{
    if(sh){if(shash(pwd)!==sh){err.textContent="密码错误";err.style.display="block";return}}
    else localStorage.setItem("p_"+name, shash(pwd));
  }
  me=name;load();
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("appBody").classList.add("show");
  document.getElementById("headerName").textContent=me;
  renderAll();
}

async function doExport(enc){
  var data={exportTime:new Date().toISOString(),user:{name:me},visits:st.visits,leads:st.leads,customers:st.customers};
  var fn=me+"_数据_"+td();
  if(enc){

    var content=JSON.stringify(await encryptData(data,p));fn+="_加密.json";
  }else{content=JSON.stringify(data,null,2);fn+="_明文.json"}
  var b=new Blob([content],{type:"application/json"}),u=URL.createObjectURL(b);
  var a=document.createElement("a");a.href=u;a.download=fn;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  closeModal("syncModal");
}
async function doImport(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=async function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d.type==="cpic_encrypted"){
        var p=prompt("文件已加密，输入密码解密：");if(!p)return;
        try{d=await decryptData(d,p)}catch(e){showToast("解密失败");return}
      }
      if(d.visits)d.visits.forEach(function(v){if(!st.visits.find(function(x){return x.id===v.id}))st.visits.push(v)});
      if(d.leads)d.leads.forEach(function(l){if(!st.leads.find(function(x){return x.id===l.id}))st.leads.push(l)});
      if(d.customers)d.customers.forEach(function(c){if(!st.customers.find(function(x){return x.id===c.id}))st.customers.push(c)});
      save();renderAll();showToast("导入成功");
    }catch(e){showToast("文件格式错误")}
  };r.readAsText(f);e.target.value="";
}
  if(navigator.share&&enc===false){try{navigator.share({title:"数据导出",text:me+"的数据",files:[new File([content],fn,{type:"application/json"})]})}catch(e){}}
